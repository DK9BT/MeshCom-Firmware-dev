name: PlatformIO CI

on: 
  push:
    tags:
    - '*'

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - uses: actions/cache@v4
      with:
        path: |
          ~/.cache/pip
          ~/.platformio/.cache
        key: ${{ runner.os }}-pio
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install PlatformIO Core
      run: pip install --upgrade platformio

    - name: Build PlatformIO Project
      run: pio run -e E22-DevKitC

    - name: Upload build firmware
      uses: actions/upload-artifact@v4
      with:
        path: .pio/build/E22-DevKitC/firmware.bin
        name: E22-DevKitC-firmware.bin
        
    - uses: ncipollo/release-action@v1
      with:
        artifacts: ".pio/build/E22-DevKitC/firmware.bin"
        bodyFile: "README.md"
